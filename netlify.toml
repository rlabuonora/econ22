[build]
command = 'hugo'
publish = 'public'

[build.processing]
skip_processing = true

[build.environment]
HUGO_VERSION = '0.110.0'
NODE_VERSION = '22'


[context]
[context.branch-deploy]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.deploy-preview]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.production]
[context.production.environment]
HUGO_ENV = 'production'
